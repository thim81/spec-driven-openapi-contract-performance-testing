# Inspectr proxy for the Lovable webapp preview server.
listen: ':8004'
backend: 'http://127.0.0.1:5173'

# Start the webapp automatically with the proxy.
command: 'npm'
commandArgs:
  - '-C'
  - 'loveable-app'
  - 'run'
  - 'inspectr:preview'

# Inspectr request log and UI.
app: false
print: true
storeInMemory: true

expose: true
channel: 'marvel-app'
channelCode: 'marvel-app-123'
