[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "marvel-appearance-fastmcp"
version = "1.0.0"
description = "Curated FastMCP server generated from the Marvel Appearance OpenAPI document"
requires-python = ">=3.10"
dependencies = [
  "fastmcp==3.4.2",
  "httpx>=0.28,<1",
  "pyyaml>=6,<7",
]

[tool.hatch.build.targets.wheel]
only-include = ["server.py"]
